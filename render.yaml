services:
  - type: web
    name: tania-portafolio
    runtime: static
    rootDir: portafolio-react
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    routes:
      # SPA con React Router: cualquier ruta que no sea un archivo real
      # (ej. /empresa, /experiencia, /portafolio) debe servir index.html
      # para que el enrutado del lado del cliente la resuelva.
      - type: rewrite
        source: /*
        destination: /index.html
